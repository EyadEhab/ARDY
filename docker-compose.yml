services:
  # Model Training Service (runs once to prepare models)
  model-trainer:
    build:
      context: .
      dockerfile: Dockerfile.model-trainer
    container_name: ardy-model-trainer
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
    networks:
      - ardy-network
    restart: "no"
    healthcheck:
      test: ["CMD", "test", "-f", "/app/plant_doctor/crop_model.h5"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s

  # Frontend Wizard Dashboard Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ardy-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_CLIENT_TOOLBAR_MODE=minimal
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - PLANT_DOCTOR_URL=http://plant-doctor-api:8000
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    networks:
      - ardy-network
    depends_on:
      model-trainer:
        condition: service_completed_successfully
      plant-doctor-api:
        condition: service_healthy
    restart: unless-stopped

  ardy-redis:
    image: redis:7-alpine
    container_name: ardy-redis
    networks:
      - ardy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  plant-doctor-api:
    build:
      context: ./plant_doctor
      dockerfile: Dockerfile
    container_name: plant-doctor-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://ardy-redis:6379/0}
      - MODEL_PATH=/app/models/crop_model.h5
      - TREATMENTS_PATH=/app/models/treatments.json
    depends_on:
      ardy-redis:
        condition: service_healthy
    networks:
      - ardy-network
    restart: unless-stopped

networks:
  ardy-network:
    driver: bridge
