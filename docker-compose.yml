services:
  # Model Training Service (runs once to prepare models)
  model-trainer:
    build:
      context: .
      dockerfile: Dockerfile.model-trainer
    container_name: egyptagri-model-trainer
    volumes:
      - ./models:/app/models
    networks:
      - egyptagri-network
    restart: "no"

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: egyptagri-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=backend.py
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-demo_key_for_testing}
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    networks:
      - egyptagri-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      model-trainer:
        condition: service_completed_successfully

  # Frontend Wizard Dashboard Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: egyptagri-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_CLIENT_TOOLBAR_MODE=minimal
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-demo_key_for_testing}
      - BACKEND_URL=http://backend:5000
      - PLANT_DOCTOR_URL=http://plant-doctor-api:8000
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./.env:/app/.env:ro
    networks:
      - egyptagri-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Plant Doctor - Crop Disease Detection API
  plant-doctor-api:
    build:
      context: ./deploy
      dockerfile: Dockerfile
    container_name: plant-doctor-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/crop_model.h5
      - TREATMENTS_PATH=/app/models/treatments.json
    volumes:
      - ./models:/app/models:ro
    networks:
      - egyptagri-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      model-trainer:
        condition: service_completed_successfully

  # PostgreSQL - Persistent Storage for User History & Profiles
  db:
    image: postgres:15-alpine
    container_name: egyptagri-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=plant_doctor_secure
      - POSTGRES_DB=plant_doctor_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - egyptagri-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d plant_doctor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis - Enterprise Message Broker & Cache
  redis:
    image: redis:7-alpine
    container_name: egyptagri-redis
    ports:
      - "6379:6379"
    networks:
      - egyptagri-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  egyptagri-network:
    driver: bridge
