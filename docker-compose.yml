services:
  # Model Training Service (runs once to prepare models)
  model-trainer:
    build:
      context: .
      dockerfile: Dockerfile.model-trainer
    container_name: egyptagri-model-trainer
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
    networks:
      - egyptagri-network
    restart: "no"
    healthcheck:
      test: ["CMD", "test", "-f", "/app/models/xgb_crop_classifier.pkl"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: egyptagri-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=backend.py
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-demo_key_for_testing}
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    networks:
      - egyptagri-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      model-trainer:
        condition: service_completed_successfully

  # Frontend Wizard Dashboard Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: egyptagri-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_CLIENT_TOOLBAR_MODE=minimal
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-demo_key_for_testing}
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./.env:/app/.env:ro
    networks:
      - egyptagri-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  egyptagri-network:
    driver: bridge
