services:
  # Model Training Service (runs once to prepare models)
  model-trainer:
    build:
      context: .
      dockerfile: Dockerfile.model-trainer
    container_name: ardy-model-trainer
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
      - ./plant_doctor:/app/plant_doctor
    networks:
      - ardy-network
    restart: "no"
    healthcheck:
      test: ["CMD", "test", "-f", "/app/models/xgb_crop_classifier.pkl"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ardy-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=backend.py
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-demo_key_for_testing}
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    networks:
      - ardy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      model-trainer:
        condition: service_completed_successfully

  # Frontend Wizard Dashboard Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ardy-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_CLIENT_TOOLBAR_MODE=minimal
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-demo_key_for_testing}
      - BACKEND_URL=http://ardy-backend:5000
      - PLANT_DOCTOR_URL=http://plant-doctor-api:8000
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    networks:
      - ardy-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  ardy-db:
    image: postgres:15-alpine
    container_name: ardy-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=plant_doctor_secure
      - POSTGRES_DB=plant_doctor_db
    networks:
      - ardy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d plant_doctor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ardy-redis:
    image: redis:7-alpine
    container_name: ardy-redis
    networks:
      - ardy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  plant-doctor-api:
    build:
      context: ./plant_doctor
      dockerfile: Dockerfile
    container_name: plant-doctor-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:plant_doctor_secure@ardy-db:5432/plant_doctor_db}
      - REDIS_URL=${REDIS_URL:-redis://ardy-redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-for-plant-doctor-saas}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - MODEL_PATH=/app/models/crop_model.h5
      - TREATMENTS_PATH=/app/models/treatments.json
    volumes:
      - ./plant_doctor:/app/models:ro
    depends_on:
      ardy-db:
        condition: service_healthy
      ardy-redis:
        condition: service_healthy
    networks:
      - ardy-network
    restart: unless-stopped

networks:
  ardy-network:
    driver: bridge
